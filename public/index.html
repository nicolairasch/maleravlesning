<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Målere">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<title>Måleravlesning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a3a6b;
  --ink2: #22497f;
  --ink3: #2d3748;
  --paper: #f7f5f0;
  --paper2: #edeae3;
  --paper3: #e2ddd5;
  --line: rgba(13,17,23,0.12);
  --line2: rgba(13,17,23,0.22);
  --amber: #e8a020;
  --amber-light: #fdf3e0;
  --amber-dark: #c47f08;
  --teal: #0e7f6e;
  --teal-light: #e0f5f2;
  --teal-dark: #085c4f;
  --red: #c0392b;
  --red-light: #fceae8;
  --blue: #1a4fa0;
  --blue-light: #e8f0fb;
  --mono: 'Inter', sans-serif;
  --display: 'Inter', sans-serif;
  --r: 10px;
  --r-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header { background: var(--ink); padding: 0 16px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 820px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 12px; overflow: hidden; }
.header-logo { font-family: var(--display); font-weight: 800; font-size: 17px; color: #fff; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
.status-pill { display: flex; align-items: center; gap: 7px; font-size: 11px; color: rgba(255,255,255,0.45); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0; }
.status-dot.ok    { background: #3dd68c; box-shadow: 0 0 6px #3dd68c88; }
.status-dot.error { background: #f87171; }
.status-dot.loading { background: var(--amber); animation: blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* TABS */
.tabs { background: var(--ink2); padding: 0 16px; }
.tabs-inner { max-width: 820px; margin: 0 auto; display: flex; align-items: center; overflow: hidden; }
.tab-btn { padding: 13px 12px; font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: .05em; text-transform: uppercase; border: none; background: none; color: rgba(255,255,255,0.38); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; white-space: nowrap; }
.tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }
.tab-btn:hover { color: rgba(255,255,255,.75); }

/* MAIN */
.main { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; }

/* MONTH BAR */
.month-bar { display: flex; align-items: center; gap: 10px; background: var(--ink); border-radius: var(--r-lg); padding: 14px 18px; margin-bottom: 24px; flex-wrap: wrap; }
.month-bar-label { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.38); letter-spacing: .08em; text-transform: uppercase; }
.month-bar select { padding: 7px 12px; border-radius: var(--r); border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.07); color: #fff; font-family: var(--mono); font-size: 13px; cursor: pointer; outline: none; transition: border-color .2s; }
.month-bar select:focus { border-color: var(--amber); }
.month-bar select option { background: var(--ink2); }

/* GROUP LABEL */
.group-label { font-family: var(--display); font-weight: 600; font-size: 11px; color: var(--ink3); letter-spacing: .1em; text-transform: uppercase; margin: 28px 0 12px; display: flex; align-items: center; gap: 10px; }
.group-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.group-label:first-child { margin-top: 0; }

/* METER CARD */
.meter-card { background: #fff; border: 1px solid var(--line); border-radius: var(--r-lg); padding: 18px; margin-bottom: 12px; transition: box-shadow .2s; }
.meter-card:hover { box-shadow: 0 4px 24px rgba(13,17,23,0.07); }
.meter-name { font-family: var(--display); font-weight: 600; font-size: 15px; color: var(--ink); letter-spacing: -0.01em; margin-bottom: 3px; }
.meter-sub { font-family: var(--mono); font-size: 11px; color: var(--ink3); letter-spacing: .04em; margin-bottom: 14px; }

/* INPUT + CAMERA */
.input-group { display: flex; gap: 10px; align-items: stretch; margin-bottom: 10px; }
.reading-input { flex: 1; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 600; padding: 12px 14px; border: 2px solid var(--line2); border-radius: var(--r); background: var(--paper); color: var(--ink); transition: border-color .2s, background .2s; letter-spacing: -0.01em; min-width: 0; }
.reading-input:focus { outline: none; border-color: var(--amber); background: var(--amber-light); }
.reading-input::placeholder { font-size: 14px; font-weight: 400; color: rgba(13,17,23,0.22); }

/* BIG CAMERA BUTTON */
.cam-btn {
  width: 72px;
  flex-shrink: 0;
  border-radius: var(--r);
  border: 2px solid var(--ink);
  background: var(--ink);
  color: #fff;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.cam-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--amber);
  transform: scaleY(0);
  transform-origin: bottom;
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  z-index: 0;
}
.cam-btn:hover::before { transform: scaleY(1); }
.cam-btn:hover { border-color: var(--amber-dark); color: var(--ink); }
.cam-btn svg, .cam-btn .cam-label { position: relative; z-index: 1; pointer-events: none; }
.cam-btn svg { width: 28px; height: 28px; }
.cam-label { font-family: var(--mono); font-size: 9px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; opacity: .65; }
.cam-btn.scanning { border-color: var(--amber-dark); animation: camPulse .9s ease-in-out infinite; }
.cam-btn.scanning::before { transform: scaleY(1); }
.cam-btn.scanning svg, .cam-btn.scanning .cam-label { color: var(--ink); }
.cam-btn.scanned { border-color: var(--teal-dark); background: var(--teal); }
.cam-btn.scanned::before { background: var(--teal); transform: scaleY(1); }
@keyframes camPulse { 0%,100%{opacity:1} 50%{opacity:.65} }

/* PREV / CONSUMPTION */
.prev-reading { font-family: var(--mono); font-size: 11px; color: var(--ink3); padding: 0 2px 6px; }
.prev-reading strong { color: var(--ink); }
.consumption { display: flex; align-items: center; justify-content: space-between; padding: 10px 13px; border-radius: var(--r); background: var(--paper2); border-left: 3px solid var(--line2); margin-bottom: 4px; }
.consumption.up   { background: var(--red-light);  border-left-color: var(--red); }
.consumption.down { background: var(--teal-light); border-left-color: var(--teal); }
.consumption-label { font-size: 12px; color: var(--ink3); }
.consumption-value { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--ink); }
.consumption-value.up   { color: var(--red); }
.consumption-value.down { color: var(--teal-dark); }
.consumption-diff { font-size: 11px; color: var(--ink3); padding: 2px 2px 8px; }

/* PDF RAPPORT TAB */
.rapport-intro { font-size: 14px; color: var(--ink3); line-height: 1.6; margin-bottom: 20px; }
.rapport-options { background: #fff; border: 1px solid var(--line); border-radius: var(--r-lg); padding: 20px; margin-bottom: 16px; }
.rapport-options h3 { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 14px; }
.rapport-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.rapport-row label { font-size: 13px; color: var(--ink3); min-width: 90px; }
.rapport-row select { padding: 7px 12px; border-radius: var(--r); border: 1.5px solid var(--line2); background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; }
.pdf-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 18px; padding: 14px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; border-radius: var(--r); border: none; background: var(--ink); color: #fff; cursor: pointer; transition: all .2s; letter-spacing: -0.01em; }
.pdf-btn:hover { background: var(--ink2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,58,107,0.25); }
.pdf-btn:active { transform: translateY(0); }
.pdf-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.pdf-btn.generating { opacity: .6; pointer-events: none; }
.rapport-preview { background: #fff; border: 1px solid var(--line); border-radius: var(--r-lg); padding: 20px; }
.rapport-preview h3 { font-size: 13px; font-weight: 600; color: var(--ink3); margin-bottom: 14px; letter-spacing: .02em; text-transform: uppercase; font-size: 11px; }
.preview-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.preview-table th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 600; color: var(--ink3); letter-spacing: .04em; text-transform: uppercase; border-bottom: 2px solid var(--line2); }
.preview-table th:last-child, .preview-table td:last-child { text-align: right; }
.preview-table th:nth-child(3), .preview-table td:nth-child(3) { text-align: right; }
.preview-table td { padding: 10px 10px; border-bottom: 0.5px solid var(--line); color: var(--ink); }
.preview-table tr:last-child td { border-bottom: none; }
.preview-table tr.total-row td { font-weight: 600; border-top: 2px solid var(--line2); border-bottom: none; background: var(--paper2); }
.tag-up   { color: var(--red); font-size: 12px; }
.tag-down { color: var(--teal-dark); font-size: 12px; }
.save-btn { width: 100%; margin-top: 10px; padding: 11px; font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; border-radius: var(--r); border: 2px solid var(--line2); background: transparent; color: var(--ink); cursor: pointer; transition: all .2s; }
.save-btn:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
.save-btn.saving { opacity: .4; pointer-events: none; }
.save-btn.saved  { background: var(--teal); border-color: var(--teal); color: #fff; }
.save-btn.error  { background: var(--red-light); border-color: var(--red); color: var(--red); }

/* STAT CARDS */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--ink); border-radius: var(--r-lg); padding: 16px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--amber); }
.stat-card.prev::before { background: rgba(255,255,255,0.12); }
.stat-label { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.38); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-family: var(--display); font-weight: 800; font-size: 26px; color: #fff; line-height: 1; letter-spacing: -0.02em; }
.stat-diff { font-family: var(--mono); font-size: 11px; margin-top: 6px; }
.stat-diff.up      { color: #f87171; }
.stat-diff.down    { color: #3dd68c; }
.stat-diff.neutral { color: rgba(255,255,255,0.28); }

/* CHART CARDS */
.chart-card { background: #fff; border: 1px solid var(--line); border-radius: var(--r-lg); padding: 18px; margin-bottom: 14px; }
.chart-card-title { font-family: var(--display); font-weight: 600; font-size: 13px; color: var(--ink); margin-bottom: 12px; }
.legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--ink3); }
.legend-box { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* CAMERA MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 300; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal { background: var(--ink); border-radius: var(--r-lg) var(--r-lg) 0 0; padding: 22px 18px 40px; width: 100%; max-width: 520px; border-top: 3px solid var(--amber); }
.modal-title { font-family: var(--display); font-weight: 800; font-size: 19px; color: #fff; letter-spacing: -0.02em; margin-bottom: 4px; }
.modal-sub { font-family: var(--mono); font-size: 12px; color: rgba(255,255,255,0.38); margin-bottom: 18px; letter-spacing: .03em; }
.video-wrap { position: relative; width: 100%; border-radius: var(--r); overflow: hidden; background: #000; aspect-ratio: 4/3; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.08); }
#camera-video { width: 100%; height: 100%; object-fit: cover; display: block; }
.scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.scan-frame { width: 80%; height: 38%; border: 2px solid var(--amber); border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.48); animation: framePulse 2s ease-in-out infinite; }
@keyframes framePulse { 0%,100%{border-color:var(--amber);} 50%{border-color:rgba(232,160,32,0.35);} }
.scan-hint { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.65); letter-spacing: .04em; }
.scan-result-box { background: rgba(232,160,32,0.1); border: 1px solid var(--amber); border-radius: var(--r); padding: 14px 16px; margin-bottom: 14px; display: none; }
.scan-result-box.show { display: block; }
.scan-result-label { font-family: var(--mono); font-size: 10px; color: var(--amber); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
.scan-result-value { font-family: var(--display); font-weight: 800; font-size: 34px; color: #fff; letter-spacing: -0.02em; }
.modal-actions { display: flex; gap: 10px; }
.modal-btn { flex: 1; padding: 13px; font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; border-radius: var(--r); border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.65); cursor: pointer; transition: all .2s; }
.modal-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.modal-btn.primary { background: var(--amber); border-color: var(--amber); color: var(--ink); font-weight: 500; }
.modal-btn.primary:hover { background: var(--amber-dark); border-color: var(--amber-dark); }
.modal-btn:disabled { opacity: .3; pointer-events: none; }
canvas#capture-canvas { display: none; }
</style>
</head>

  <div class="header-inner">

let dbCache={}, activeCamMeter=null, cameraStream=null;

async function dbFetch(path,opts={}){
  const method=opts.method||'GET';
  const body=opts.body?JSON.parse(opts.body):undefined;
  const res=await fetch('/.netlify/functions/supabase-proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({method,path,body})
  });
  if(!res.ok){const t=await res.text();throw new Error(t);}
  return res.json();
}

async function loadAllFromDB(){
  try{
    const rows=await dbFetch('maler_avlesninger?select=meter_id,year,month,reading,consumption&order=year,month');
    dbCache={};
    rows.forEach(r=>{dbCache[`${r.meter_id}_${r.year}_${r.month}`]={reading:r.reading,consumption:r.consumption};});
    setStatus('Tilkoblet','ok');
  }catch(e){setStatus('Tilkoblingsfeil','error');}
}
function setStatus(txt,state){
  document.getElementById('status-text').textContent=txt;
  document.getElementById('status-dot').className='status-dot '+(state||'loading');
}
function ck(id,y,m){return`${id}_${y}_${m}`;}
function getReading(id,year,month){
  const b=BASE_READINGS[id];
  if(b&&b[year]&&b[year][month]!==undefined)return b[year][month];
  const c=dbCache[ck(id,year,month)];
  return c?c.reading:null;
}
function getPrevReading(id,year,month){return month===0?getReading(id,year-1,11):getReading(id,year,month-1);}
function getConsumption(id,year,month){
  const c=dbCache[ck(id,year,month)];
  if(c&&c.consumption!==null&&c.consumption!==undefined)return c.consumption;
  if(HIST[id]&&HIST[id][year])return HIST[id][year][month]??null;
  return null;
}

function showTab(t){
  document.getElementById('tab-registrer').style.display=t==='registrer'?'':'none';
  document.getElementById('tab-statistikk').style.display=t==='statistikk'?'':'none';
  document.getElementById('tab-rapport').style.display=t==='rapport'?'':'none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',
    (t==='registrer'&&b.textContent.includes('Registrer'))||
    (t==='statistikk'&&b.textContent.includes('Statistikk'))||
    (t==='rapport'&&b.textContent.includes('Rapport'))
  ));
  if(t==='statistikk')renderStats();
  if(t==='rapport')renderRapportPreview();
}

function renderMeters(){
  const month=parseInt(document.getElementById('sel-month').value);
  const year=parseInt(document.getElementById('sel-year').value);
  const list=document.getElementById('meter-list');
  let groups={};
  METERS.forEach(m=>{if(!groups[m.group])groups[m.group]=[];groups[m.group].push(m);});
  let html='';
  Object.entries(groups).forEach(([g,meters])=>{
    html+=`<p class="group-label">${g}</p>`;
    meters.forEach(m=>{
      const cur=getReading(m.id,year,month);
      const prev=getPrevReading(m.id,year,month);
      const cons=getConsumption(m.id,year,month);
      const prevC=month>0?getConsumption(m.id,year,month-1):getConsumption(m.id,year-1,11);
      let cls='', consHtml='';
      if(cons!==null&&cons>0){
        cls=prevC&&prevC>0?(cons>prevC*1.1?'up':cons<prevC*0.9?'down':''):'';
        consHtml=`<div class="consumption ${cls}"><span class="consumption-label">Forbruk ${MONTHS[month]}</span><span class="consumption-value ${cls}">${Math.round(cons).toLocaleString('nb-NO')} kWh</span></div>`;
        if(prevC&&prevC>0){const diff=Math.round(cons-prevC),sign=diff>0?'+':'';consHtml+=`<p class="consumption-diff">vs forrige: ${sign}${diff.toLocaleString('nb-NO')} kWh</p>`;}
      }else{
        consHtml=`<div class="consumption"><span class="consumption-label">Forbruk ${MONTHS[month]}</span><span class="consumption-value" style="opacity:.3">—</span></div>`;
      }
      html+=`<div class="meter-card">
        <p class="meter-name">${m.name}</p>
        <p class="meter-sub">${m.meterId||'&nbsp;'}</p>
        ${m.consumptionOnly ? `
        <div class="input-group">
          <input class="reading-input" type="text" inputmode="numeric" pattern="[0-9]*" id="inp-${m.id}" placeholder="Forbruk kWh…" value="${cons!==null&&cons!==undefined&&cons>0?Math.round(cons):''}" oninput="onConsumptionChange('${m.id}',${year},${month},this.value)"/>
        </div>
        ${consHtml}
        ` : `
        <div class="input-group">
          <input class="reading-input" type="text" inputmode="numeric" pattern="[0-9]*" id="inp-${m.id}" placeholder="Målerstand…" value="${cur!==null&&cur!==undefined?cur:''}" oninput="onReadingChange('${m.id}',${year},${month},this.value)"/>
          <button class="cam-btn" id="cam-${m.id}" onclick="openCamModal('${m.id}','${m.name}')" title="Skann med kamera">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span class="cam-label">Skann</span>
          </button>
        </div>
        ${prev!==null?`<p class="prev-reading">Forrige: <strong>${Math.round(prev).toLocaleString('nb-NO')}</strong></p>`:''}
        ${consHtml}
        `}
        <button class="save-btn" id="savebtn-${m.id}" onclick="saveReading('${m.id}',${year},${month})">Lagre avlesning</button>
      </div>`;
    });
  });
  list.innerHTML=html;
}

function onConsumptionChange(id,year,month,val){
  const num=val===''?null:parseInt(val.replace(/\s/g,''),10);
  if(!dbCache[ck(id,year,month)])dbCache[ck(id,year,month)]={};
  dbCache[ck(id,year,month)].consumption=num;
  dbCache[ck(id,year,month)].reading=null;
}

function onReadingChange(id,year,month,val){
  const num=val===''?null:parseInt(val.replace(/\s/g,''),10);
  if(!dbCache[ck(id,year,month)])dbCache[ck(id,year,month)]={};
  dbCache[ck(id,year,month)].reading=num;
  const prev=getPrevReading(id,year,month);
  if(num!==null&&prev!==null)dbCache[ck(id,year,month)].consumption=num-prev;
  const card=document.getElementById(`savebtn-${id}`)?.closest('.meter-card');
  if(card){
    const cons=dbCache[ck(id,year,month)]?.consumption;
    const consEl=card.querySelector('.consumption-value');
    if(consEl&&cons!=null)consEl.textContent=Math.round(cons).toLocaleString('nb-NO')+' kWh';
    if(consEl&&cons!=null){
      const prev2=month>0?getConsumption(id,year,month-1):getConsumption(id,year-1,11);
      if(prev2&&prev2>0){consEl.className='consumption-value'+(cons>prev2*1.1?' up':cons<prev2*0.9?' down':'');}
    }
  }
}

async function saveReading(id,year,month){
  const inp=document.getElementById(`inp-${id}`);
  const btn=document.getElementById(`savebtn-${id}`);
  const val=inp?parseInt(inp.value.replace(/\s/g,''),10):null;
  if(val===null||isNaN(val)){inp&&inp.focus();return;}
  const meter=METERS.find(m=>m.id===id);
  let reading=val,consumption=null;
  if(meter&&meter.consumptionOnly){
    reading=null;consumption=val;
  }else{
    const prev=getPrevReading(id,year,month);
    consumption=prev!==null?val-prev:null;
  }
  btn.textContent='Lagrer…';btn.className='save-btn saving';
  try{
    await dbFetch('maler_avlesninger',{method:'POST',body:JSON.stringify({meter_id:id,year,month,reading,consumption})});
    dbCache[ck(id,year,month)]={reading,consumption};
    btn.textContent='Lagret ✓';btn.className='save-btn saved';
    setTimeout(()=>{btn.textContent='Lagre avlesning';btn.className='save-btn';renderMeters();},1800);
  }catch(e){
    btn.textContent='Feil — prøv igjen';btn.className='save-btn error';
    setTimeout(()=>{btn.textContent='Lagre avlesning';btn.className='save-btn';},2500);
  }
}

async function openCamModal(meterId,meterName){
  activeCamMeter=meterId;
  document.getElementById('cam-meter-name').textContent=meterName;
  document.getElementById('scan-result-box').classList.remove('show');
  const btn=document.getElementById('cam-capture-btn');
  btn.textContent='Ta bilde og les av';btn.disabled=false;btn.onclick=captureAndScan;
  document.getElementById('cam-modal').style.display='flex';
  try{
    cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}});
    document.getElementById('camera-video').srcObject=cameraStream;
  }catch(e){alert('Kunne ikke åpne kamera: '+e.message);closeCamModal();}
}

function closeCamModal(event){
  if(event&&event.target!==document.getElementById('cam-modal'))return;
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
  document.getElementById('cam-modal').style.display='none';
  activeCamMeter=null;
}

async function captureAndScan(){
  const video=document.getElementById('camera-video');
  const canvas=document.getElementById('capture-canvas');
  const btn=document.getElementById('cam-capture-btn');
  const camBtn=activeCamMeter?document.getElementById(`cam-${activeCamMeter}`):null;
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  const base64=canvas.toDataURL('image/jpeg',0.92).split(',')[1];
  btn.textContent='Analyserer…';btn.disabled=true;
  if(camBtn)camBtn.classList.add('scanning');
  try{
    const res=await fetch('/.netlify/functions/scan-meter',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:base64,mediaType:'image/jpeg'})});
    const data=await res.json();
    if(camBtn)camBtn.classList.remove('scanning');
    if(data.value!==null&&data.value!==undefined){
      document.getElementById('scan-result-value').textContent=data.value.toLocaleString('nb-NO');
      document.getElementById('scan-result-box').classList.add('show');
      btn.textContent='Bruk denne verdien';btn.disabled=false;
      btn.onclick=()=>applyScannedValue(data.value);
    }else{
      btn.textContent='Kunne ikke lese — prøv igjen';btn.disabled=false;btn.onclick=captureAndScan;
    }
  }catch(e){
    if(camBtn)camBtn.classList.remove('scanning');
    btn.textContent='Feil — prøv igjen';btn.disabled=false;btn.onclick=captureAndScan;
  }
}

function applyScannedValue(value){
  if(!activeCamMeter)return;
  const inp=document.getElementById(`inp-${activeCamMeter}`);
  if(inp){inp.value=value;inp.dispatchEvent(new Event('input'));}
  const camBtn=document.getElementById(`cam-${activeCamMeter}`);
  if(camBtn){camBtn.classList.add('scanned');setTimeout(()=>camBtn.classList.remove('scanned'),3000);}
  closeCamModal();renderMeters();
}

let chart12=null,chartYTD=null;
function renderStats(){
  const meterId=document.getElementById('stat-meter').value;
  const month=parseInt(document.getElementById('stat-month').value);

  const thisM=getConsumption(meterId,year,month)||0;
  const lastM=getConsumption(meterId,py,month)||0;
  const ytd26=Array.from({length:month+1},(_,i)=>getConsumption(meterId,year,i)||0).reduce((a,b)=>a+b,0);
  const ytd25=Array.from({length:month+1},(_,i)=>getConsumption(meterId,py,i)||0).reduce((a,b)=>a+b,0);
  function diff(a,b){if(!b)return`<span class="stat-diff neutral">kWh</span>`;const d=a-b,p=Math.round((d/b)*100),s=d>0?'+':'';return`<span class="stat-diff ${d>0?'up':'down'}">${s}${Math.round(d).toLocaleString('nb-NO')} kWh (${s}${p}%)</span>`;}
  document.getElementById('stat-cards').innerHTML=`
    <div class="stat-card"><div class="stat-label">${MONTHS[month]} ${year}</div><div class="stat-value">${Math.round(thisM).toLocaleString('nb-NO')}</div>${diff(thisM,lastM)}</div>
    <div class="stat-card prev"><div class="stat-label">${MONTHS[month]} ${py}</div><div class="stat-value">${Math.round(lastM).toLocaleString('nb-NO')}</div><span class="stat-diff neutral">kWh</span></div>
    <div class="stat-card"><div class="stat-label">Hittil i år ${year}</div><div class="stat-value">${Math.round(ytd26).toLocaleString('nb-NO')}</div>${diff(ytd26,ytd25)}</div>
    <div class="stat-card prev"><div class="stat-label">Hittil i år ${py}</div><div class="stat-value">${Math.round(ytd25).toLocaleString('nb-NO')}</div><span class="stat-diff neutral">kWh</span></div>`;
  const l12=[],a26=[],a25=[];
  for(let i=0;i<12;i++){const mIdx=(month-11+i+12)%12,yr=(month-11+i+12)<12?py:year;l12.push(MONTHS[mIdx].substring(0,3));a26.push(getConsumption(meterId,yr,mIdx)||0);a25.push(getConsumption(meterId,yr-1,mIdx)||0);}
  document.getElementById('legend-12').innerHTML=`<span class="legend-item"><span class="legend-box" style="background:#e8a020"></span>${year}</span><span class="legend-item"><span class="legend-box" style="background:#c8bfaa"></span>${py}</span>`;
  if(chart12)chart12.destroy();
  chart12=new Chart(document.getElementById('chart12'),{type:'bar',data:{labels:l12,datasets:[{label:`${year}`,data:a26,backgroundColor:'#e8a020',borderRadius:4},{label:`${py}`,data:a25,backgroundColor:'#ddd8ce',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,maxRotation:0,font:{size:11,family:'Inter'}}},y:{ticks:{font:{size:11,family:'Inter'},callback:v=>Math.round(v).toLocaleString('nb-NO')}}},barPercentage:0.8,categoryPercentage:0.7}});
  const ytdL=MONTHS.slice(0,month+1).map(m=>m.substring(0,3));
  const yA=Array.from({length:month+1},(_,i)=>getConsumption(meterId,year,i)||0);
  const yB=Array.from({length:month+1},(_,i)=>getConsumption(meterId,py,i)||0);
  document.getElementById('legend-ytd').innerHTML=`<span class="legend-item"><span class="legend-box" style="background:#e8a020"></span>${year}</span><span class="legend-item"><span class="legend-box" style="background:#c8bfaa"></span>${py}</span>`;
  if(chartYTD)chartYTD.destroy();

function getRapportData(month, year){
  const py = year - 1;
  return METERS.map(m => {
    const cons = getConsumption(m.id, year, month) || 0;
    const prevMonthCons = month > 0 ? (getConsumption(m.id, year, month-1)||0) : (getConsumption(m.id, py, 11)||0);
    const sameMthLastYr = getConsumption(m.id, py, month) || 0;
    const reading = getReading(m.id, year, month);
    const ytd = Array.from({length:month+1},(_,i)=>getConsumption(m.id,year,i)||0).reduce((a,b)=>a+b,0);
    const ytdPy = Array.from({length:month+1},(_,i)=>getConsumption(m.id,py,i)||0).reduce((a,b)=>a+b,0);
    return {m, cons, prevMonthCons, sameMthLastYr, reading, ytd, ytdPy};
  });
}

function renderRapportPreview(){
  const month = parseInt(document.getElementById('rpt-month').value);
  const year  = parseInt(document.getElementById('rpt-year').value);
  const py = year - 1;
  const data = getRapportData(month, year);

  function pct(a,b){ if(!b) return ''; const d=Math.round((a-b)/b*100); return d>0?`<span class="tag-up">▲${d}%</span>`:`<span class="tag-down">▼${Math.abs(d)}%</span>`; }

  let html = `<table class="preview-table">
    <thead><tr>
      <th>Måler</th>
      <th style="text-align:right">Målerstand</th>
      <th style="text-align:right">Forbruk ${MONTHS[month]}</th>
      <th style="text-align:right">vs ${MONTHS[month]} ${py}</th>
      <th style="text-align:right">Hittil i år</th>
      <th style="text-align:right">vs hittil ${py}</th>
    </tr></thead><tbody>`;

  let totalCons=0, totalPrevM=0, totalYtd=0, totalYtdPy=0;
  data.forEach(({m,cons,sameMthLastYr,reading,ytd,ytdPy})=>{
    totalCons+=cons; totalPrevM+=sameMthLastYr; totalYtd+=ytd; totalYtdPy+=ytdPy;
    html+=`<tr>
      <td><strong>${m.name}</strong>${m.meterId?`<br><span style="font-size:11px;color:#888">${m.meterId}</span>`:''}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums">${reading!==null?Math.round(reading).toLocaleString('nb-NO'):'—'}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums">${cons>0?Math.round(cons).toLocaleString('nb-NO')+' kWh':'—'}</td>
      <td style="text-align:right">${cons>0&&sameMthLastYr>0?pct(cons,sameMthLastYr):'—'}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums">${ytd>0?Math.round(ytd).toLocaleString('nb-NO')+' kWh':'—'}</td>
      <td style="text-align:right">${ytd>0&&ytdPy>0?pct(ytd,ytdPy):'—'}</td>
    </tr>`;
  });

  html+=`<tr class="total-row">
    <td>Total</td>
    <td></td>
    <td style="text-align:right">${Math.round(totalCons).toLocaleString('nb-NO')} kWh</td>
    <td style="text-align:right">${totalPrevM>0?pct(totalCons,totalPrevM):'—'}</td>
    <td style="text-align:right">${Math.round(totalYtd).toLocaleString('nb-NO')} kWh</td>
    <td style="text-align:right">${totalYtdPy>0?pct(totalYtd,totalYtdPy):'—'}</td>
  </tr>`;
  html += '</tbody></table>';

  // Leietakerfordeling (basert på Excel-formler)
  const AREAS = {
    jula: 3217,
    jysk: 1752,
    evo: 460,
    ovrig: 4270
  };
  const jyskJulaTotal = AREAS.jysk + AREAS.jula;

  const felles = getConsumption('fellesmaler', year, month) || 0;
  const jyskC = getConsumption('jysk', year, month) || 0;
  const jyskVentC = getConsumption('jysk_vent', year, month) || 0;
  const julaC = getConsumption('jula', year, month) || 0;
  const lagerC = getConsumption('lager', year, month) || 0;
  const evoLokC = getConsumption('evo_lok', year, month) || 0;
  const evoVentC = getConsumption('evo_vent', year, month) || 0;

  const julaShare = AREAS.jula / jyskJulaTotal;
  const jyskShare = AREAS.jysk / jyskJulaTotal;

  const julaForbruk = (julaShare * lagerC) + julaC + (julaShare * jyskVentC);
  const jyskForbruk = (jyskShare * lagerC) + jyskC + (jyskShare * jyskVentC);
  const evoForbruk = evoLokC + evoVentC;
  const ovrigForbruk = Math.max(0, felles - (jyskC + jyskVentC + julaC + lagerC) - evoForbruk);

  const fordeling = [
    {navn: 'Jula butikk', type: 'Butikklokale', m2: AREAS.jula, kwh: julaForbruk},
    {navn: 'Jysk butikk', type: 'Butikklokale', m2: AREAS.jysk, kwh: jyskForbruk},
    {navn: 'EVO', type: 'Treningslokale', m2: AREAS.evo, kwh: evoForbruk},
    {navn: 'Øvrig kontorbygg', type: 'Kontor/Bilbutikk/lager', m2: AREAS.ovrig, kwh: ovrigForbruk}
  ];

  let totalM2 = 0, totalKwh = 0;
  fordeling.forEach(f => { totalM2 += f.m2; totalKwh += f.kwh; });

  html += `<h3 style="margin-top:28px;margin-bottom:12px;color:var(--ink);font-size:15px">Fordeling per leietaker — ${MONTHS[month]} ${year}</h3>
  <table class="preview-table">
    <thead><tr>
      <th>Leietaker</th>
      <th>Type areal</th>
      <th style="text-align:right">Areal (m²)</th>
      <th style="text-align:right">Forbruk (kWh)</th>
      <th style="text-align:right">kWh/m²</th>
    </tr></thead><tbody>`;

  fordeling.forEach(f => {
    const kwhM2 = f.m2 > 0 ? (f.kwh / f.m2) : 0;
    html += `<tr>
      <td><strong>${f.navn}</strong></td>
      <td style="color:#666">${f.type}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums">${f.m2.toLocaleString('nb-NO')}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums">${Math.round(f.kwh).toLocaleString('nb-NO')}</td>
      <td style="text-align:right;font-variant-numeric:tabular-nums">${kwhM2.toFixed(1)}</td>
    </tr>`;
  });

  const totalKwhM2 = totalM2 > 0 ? (totalKwh / totalM2) : 0;
  html += `<tr class="total-row">
    <td>Sum</td>
    <td></td>
    <td style="text-align:right">${totalM2.toLocaleString('nb-NO')}</td>
    <td style="text-align:right">${Math.round(totalKwh).toLocaleString('nb-NO')}</td>
    <td style="text-align:right">${totalKwhM2.toFixed(1)}</td>
  </tr>`;
  html += '</tbody></table>';

  document.getElementById('rapport-table-wrap').innerHTML = html;
}

async function generatePDF(){

  const py = year - 1;
  const btn = document.getElementById('pdf-btn');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();

  // Header background
  doc.setFillColor(26, 58, 107);
  doc.rect(0, 0, pageW, 22, 'F');

  // Logo text (Bjerch & Krefting)
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(11);

  doc.setFontSize(8);
  doc.text('Eiendomsforvaltning', 14, 15);

  // Report title right side
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.text(`Måleravlesning — ${MONTHS[month]} ${year}`, pageW - 14, 10, {align:'right'});
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.text(`Generert ${new Date().toLocaleDateString('nb-NO', {day:'2-digit',month:'long',year:'numeric'})}`, pageW - 14, 15, {align:'right'});

  // Amber accent line
  doc.setFillColor(232, 160, 32);
  doc.rect(0, 22, pageW, 1.5, 'F');

  const data = getRapportData(month, year);

  // Build table rows
  const rows = data.map(({m,cons,sameMthLastYr,reading,ytd,ytdPy,prevMonthCons}) => {
    const vsLastYr = sameMthLastYr>0 ? (cons>0 ? `${cons>sameMthLastYr?'▲':'▼'} ${Math.abs(Math.round((cons-sameMthLastYr)/sameMthLastYr*100))}%` : '—') : '—';
    const vsYtd = ytdPy>0 ? (ytd>0 ? `${ytd>ytdPy?'▲':'▼'} ${Math.abs(Math.round((ytd-ytdPy)/ytdPy*100))}%` : '—') : '—';
    return [
      m.meterId ? `${m.name}\n${m.meterId}` : m.name,
      reading!==null ? Math.round(reading).toLocaleString('nb-NO') : '—',
      cons>0 ? Math.round(cons).toLocaleString('nb-NO') : '—',
      sameMthLastYr>0 ? Math.round(sameMthLastYr).toLocaleString('nb-NO') : '—',
      vsLastYr,
      ytd>0 ? Math.round(ytd).toLocaleString('nb-NO') : '—',
      ytdPy>0 ? Math.round(ytdPy).toLocaleString('nb-NO') : '—',
      vsYtd
    ];
  });

  // Totals row
  let tC=0,tPM=0,tY=0,tYP=0;
  data.forEach(d=>{tC+=d.cons;tPM+=d.sameMthLastYr;tY+=d.ytd;tYP+=d.ytdPy;});
  const vsTotal = tPM>0?`${tC>tPM?'▲':'▼'} ${Math.abs(Math.round((tC-tPM)/tPM*100))}%`:'—';
  const vsYtdTotal = tYP>0?`${tY>tYP?'▲':'▼'} ${Math.abs(Math.round((tY-tYP)/tYP*100))}%`:'—';
  rows.push(['TOTAL','',Math.round(tC).toLocaleString('nb-NO'),Math.round(tPM).toLocaleString('nb-NO'),vsTotal,Math.round(tY).toLocaleString('nb-NO'),Math.round(tYP).toLocaleString('nb-NO'),vsYtdTotal]);

  doc.autoTable({
    startY: 28,
    head: [[

      5: { halign: 'right', cellWidth: 30 },
      6: { halign: 'right', cellWidth: 30 },
      7: { halign: 'center', cellWidth: 22 }
    },
    didParseCell(d){
      if(d.row.index === rows.length-1){
        d.cell.styles.fillColor = [240,237,230];
        d.cell.styles.fontStyle = 'bold';
      }
      // Color endring cells
      if((d.column.index===4||d.column.index===7) && d.section==='body'){
        const v = d.cell.raw||'';

    margin: { left: 14, right: 14 }
  });

  // Section summaries
  const finalY = doc.lastAutoTable.finalY + 10;
  const groups = [{label:'Fellesmålere',ids:['fellesmaler']},{label:'Jysk / Jula',ids:['jysk','jysk_vent','jula','lager']},{label:'EVO',ids:['evo_lok','evo_vent']}];

    xPos += 88;
  });

  // === Fordeling per leietaker (kWh/m²) ===

  const felles = getConsumption('fellesmaler', year, month) || 0;

  const julaTot = (julaShare*lagerC)+julaC+(julaShare*jyskVentC);
  const jyskTot = (jyskShare*lagerC)+jyskC+(jyskShare*jyskVentC);
  const evoTot = evoLokC+evoVentC;
  const ovrigTot = Math.max(0, felles - (jyskC+jyskVentC+julaC+lagerC) - evoTot);

  const fordelingRows = [
    ['Jula butikk','Butikklokale',AREAS.jula.toLocaleString('nb-NO'),Math.round(julaTot).toLocaleString('nb-NO'),(julaTot/AREAS.jula).toFixed(1)],
    ['Jysk butikk','Butikklokale',AREAS.jysk.toLocaleString('nb-NO'),Math.round(jyskTot).toLocaleString('nb-NO'),(jyskTot/AREAS.jysk).toFixed(1)],

  ];
  const totM2 = AREAS.jula+AREAS.jysk+AREAS.evo+AREAS.ovrig;
  const totKwh = julaTot+jyskTot+evoTot+ovrigTot;

  const fordelingY = finalY + 28;
  doc.setTextColor(26,58,107);
  doc.setFontSize(11);
  doc.setFont('helvetica','bold');
  doc.text(`Fordeling per leietaker — ${MONTHS[month]} ${year}`, 14, fordelingY);

  doc.autoTable({
    startY: fordelingY + 3,
    head: [['Leietaker','Type areal','Areal (m²)','Forbruk (kWh)','kWh/m²']],
    body: fordelingRows,
    theme: 'grid',
    styles: { font: 'helvetica', fontSize: 9, cellPadding: 4 },
    headStyles: { fillColor: [26,58,107], textColor: 255, fontStyle: 'bold', fontSize: 8, halign: 'center' },
    columnStyles: {
      0: { halign: 'left', cellWidth: 50, fontStyle: 'bold' },
      1: { halign: 'left', cellWidth: 55 },
      2: { halign: 'right', cellWidth: 30 },
      3: { halign: 'right', cellWidth: 35 },
      4: { halign: 'right', cellWidth: 25 }
    },
    didParseCell(d){

    margin: { left: 14, right: 14 }
  });

  // Footer
  doc.setFillColor(245,244,240);
  doc.rect(0, pageH-10, pageW, 10, 'F');
  doc.setTextColor(150,150,140);
  doc.setFontSize(7);
  doc.setFont('helvetica','normal');
  doc.text('Bjerch & Krefting Eiendomsforvaltning', 14, pageH-4);
  doc.text(`Side 1 av 1  •  ${new Date().toLocaleDateString('nb-NO')}`, pageW-14, pageH-4, {align:'right'});

  const filename = `Maaleravlesning_${MONTHS[month]}_${year}.pdf`;
  doc.save(filename);
  btn.classList.remove('generating');
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Last ned PDF-rapport`;
}

// spin animation for loading state
const style=document.createElement('style');
style.textContent='@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
document.head.appendChild(style);

async function sendReport() {
  const month = parseInt(document.getElementById('sel-month').value);
  const year  = parseInt(document.getElementById('sel-year').value);
  const btn   = document.getElementById('send-report-btn');
  const REPORT_METERS = ['jysk','jysk_vent','jula','lager','evo_lok','evo_vent'];
  const readings = {};
  REPORT_METERS.forEach(id => { const r = dbCache[ck(id,year,month)]; if(r) readings[id]=r; });
  const hasData = Object.values(readings).some(r => r.reading!=null || r.consumption!=null);
  const sendIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  const reset = () => { btn.innerHTML=sendIcon+' Send rapport'; btn.style.opacity='1'; btn.style.pointerEvents=''; btn.style.borderColor=''; btn.style.color=''; };
  if (!hasData) {
    btn.textContent='Ingen data for denne måneden'; btn.style.color='#ffaaaa'; btn.style.borderColor='rgba(255,100,100,0.5)';
    setTimeout(reset, 3000); return;
  }
  btn.innerHTML='Sender…'; btn.style.opacity='0.6'; btn.style.pointerEvents='none';
  try {
    const res = await fetch('/.netlify/functions/send-report', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({month,year,readings}) });
    const data = await res.json();
    if (data.ok) {
      btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Rapport sendt!';
      btn.style.opacity='1'; btn.style.pointerEvents=''; btn.style.color='#3dd68c'; btn.style.borderColor='rgba(60,214,140,0.5)';
      setTimeout(reset, 4000);
    } else { throw new Error(data.error||'Ukjent feil'); }
  } catch(e) {
    btn.textContent='Feil — prøv igjen'; btn.style.opacity='1'; btn.style.pointerEvents=''; btn.style.color='#ffaaaa'; btn.style.borderColor='rgba(255,100,100,0.5)';
    setTimeout(reset, 3000);
  }
}
document.getElementById('sel-month').value=String(new Date().getMonth());
document.getElementById('stat-month').value=String(new Date().getMonth());
loadAllFromDB().then(()=>renderMeters());
</script>
